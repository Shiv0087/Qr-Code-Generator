<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QR Code Generator - Premium</title>
  <link rel="stylesheet" href="assets/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</head>
<body>
  <div class="container">
    <h1> QR Code Generator</h1>
    <input type="text" id="qrText" placeholder="Enter text or URL here..." />
    <button id="generateBtn">Generate QR</button>
    
    <div class="qr-container">
      <canvas id="qrCanvas"></canvas>
      <div class="btn-group">
        <a id="downloadBtn" download="qrcode.png">📥 Download</a>
        <button id="shareBtn">📤 Share</button>
      </div>
    </div>
  </div>

  <footer>
    Made with ❤️ by matrixCoderX
  </footer>

  <script src="assets/script.js"></script>
</body>
</html>
